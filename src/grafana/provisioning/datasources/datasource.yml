apiVersion: 1

datasources:
  - name: CorpTracker PostgreSQL
    type: postgres
    uid: corptracker-pg
    url: postgres:5432
    database: corptracker
    user: corptracker
    secureJsonData:
      password: corptracker_secret
    jsonData:
      # Grafana 12+: default DB must be set here (not only top-level `database`)
      database: corptracker
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      postgresVersion: 1600
    isDefault: true
    editable: false
