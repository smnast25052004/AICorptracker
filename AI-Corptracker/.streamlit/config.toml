[theme]
base = "dark"
font = "sans serif"

# ═══ СВЕТЛАЯ ТЕМА ═══
[theme.light]
primaryColor = "#667eea"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#1a1a2e"

# ═══ ТЁМНАЯ ТЕМА — слатовая палитра ═══
[theme.dark]
primaryColor = "#818cf8"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#f8fafc"
borderColor = "#334155"

# Палитра для алертов, метрик, бейджей
redColor = "#f87171"
orangeColor = "#fb923c"
yellowColor = "#fbbf24"
greenColor = "#4ade80"
blueColor = "#60a5fa"
violetColor = "#a78bfa"
grayColor = "#94a3b8"

# Сайдбар тёмной темы
[theme.dark.sidebar]
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#f8fafc"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[server]
headless = true
